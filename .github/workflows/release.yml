name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to publish (e.g. v14.10). Use only with workflow_dispatch.'
        required: true
        default: ''

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Decode signing keystore
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          if [ -z "$SIGNING_KEY_BASE64" ]; then
            echo "::error::SIGNING_KEY_BASE64 secret is not set"
            exit 1
          fi
          mkdir -p $RUNNER_TEMP/keys
          echo "$SIGNING_KEY_BASE64" | base64 -d > $RUNNER_TEMP/keys/release.jks
          echo "SIGNING_KEY_PATH=$RUNNER_TEMP/keys/release.jks" >> $GITHUB_ENV

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build & sign release APK
        env:
          SIGNING_KEY_PATH: ${{ env.SIGNING_KEY_PATH }}
          SIGNING_KEY_STORE_PASSWORD: ${{ secrets.SIGNING_KEY_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew :ext:assembleRelease --no-daemon

      - name: Locate output APK
        id: apk
        run: |
          APK=$(ls ext/build/outputs/apk/release/*.apk | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No APK found in ext/build/outputs/apk/release/"
            exit 1
          fi
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "name=$(basename $APK)" >> $GITHUB_OUTPUT
          sha256sum "$APK"

      - name: Verify APK signature
        run: |
          ANDROID_HOME=${ANDROID_HOME:-$ANDROID_SDK_ROOT}
          BT=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)
          "${BT}apksigner" verify --print-certs "${{ steps.apk.outputs.path }}"

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            ${{ steps.apk.outputs.path }}
