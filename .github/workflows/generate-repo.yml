name: Generate Repo Index

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Checkout (ou criar) branch repo
        uses: actions/checkout@v4
        with:
          ref: repo
          path: repo-branch
        continue-on-error: true

      - name: Criar branch repo se não existir
        run: |
          if [ ! -d "repo-branch/.git" ]; then
            mkdir -p repo-branch
            cd repo-branch
            git init
            git remote add origin https://github.com/${{ github.repository }}.git
            git checkout --orphan repo
          fi

      - name: Baixar APK do release mais recente
        id: download
        run: |
          TAG=$(gh release view --json tagName --jq '.tagName' 2>/dev/null || echo "")
          if [ -z "$TAG" ]; then
            echo "Nenhum release encontrado. Execute o workflow de release primeiro."
            exit 1
          fi
          gh release download "$TAG" --pattern "*.apk" --dir repo-branch/apk
          APK_NAME=$(ls repo-branch/apk/*.apk 2>/dev/null | head -1 | xargs basename)
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Extrair metadados do APK
        id: meta
        run: |
          APK_PATH="repo-branch/apk/${{ steps.download.outputs.apk_name }}"

          # aapt2 vem com o Android SDK pré-instalado no runner
          AAPT2="${ANDROID_SDK_ROOT}/build-tools/*/aapt2"
          AAPT2=$(echo $AAPT2 | tr ' ' '\n' | sort -V | tail -1)

          # Extrai o package name do AndroidManifest.xml
          $AAPT2 dump packagename "$APK_PATH" > /tmp/pkg.txt 2>/dev/null
          PKG=$(cat /tmp/pkg.txt)

          # Extrai versionCode e versionName
          $AAPT2 dump badging "$APK_PATH" 2>/dev/null > /tmp/badging.txt || true
          VERSION_CODE=$(grep "^package:" /tmp/badging.txt | sed "s/.*versionCode='\([^']*\)'.*/\1/")
          VERSION_NAME=$(grep "^package:" /tmp/badging.txt | sed "s/.*versionName='\([^']*\)'.*/\1/")
          APP_LABEL=$(grep "application-label:" /tmp/badging.txt | sed "s/application-label:'\([^']*\)'.*/\1/" | head -1)

          echo "pkg=$PKG" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "app_label=$APP_LABEL" >> $GITHUB_OUTPUT

      - name: Gerar index.json e index.min.json
        run: |
          APK_NAME="${{ steps.download.outputs.apk_name }}"
          PKG="${{ steps.meta.outputs.pkg }}"
          VERSION_CODE="${{ steps.meta.outputs.version_code }}"
          VERSION_NAME="${{ steps.meta.outputs.version_name }}"
          APP_LABEL="${{ steps.meta.outputs.app_label }}"

          cat > repo-branch/index.json <<EOF
          [
            {
              "name": "$APP_LABEL",
              "pkg": "$PKG",
              "apk": "$APK_NAME",
              "lang": "pt-BR",
              "code": $VERSION_CODE,
              "version": "$VERSION_NAME",
              "nsfw": 0,
              "sources": [
                {
                  "name": "Dattebayo BR",
                  "lang": "pt-BR",
                  "id": "dattebayobr",
                  "baseUrl": "https://www.dattebayo-br.com"
                }
              ]
            }
          ]
          EOF

          jq -c '.' < repo-branch/index.json > repo-branch/index.min.json

      - name: Publicar na branch repo
        run: |
          cd repo-branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git diff --staged --quiet || git commit -m "repo: update index for ${{ steps.download.outputs.tag }}"

          git push origin HEAD:repo --force
